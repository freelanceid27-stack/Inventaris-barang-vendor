<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Barang Bawaan Vendor/Proyek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        primary: '#165DFF', 
                        secondary: '#36CFC9', 
                        neutral: '#86909C', 
                        light: '#F2F3F5', 
                        dark: '#1D2129', 
                    },
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .text-shadow { text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
            .card-shadow { box-shadow: 0 4px 20px rgba(22, 93, 255, 0.08); }
            .hover-scale { transition: all 0.2s ease; }
            .hover-scale:hover { transform: scale(1.02); }
            .btn-touch { transition: all 0.2s ease; }
            .btn-touch:active { transform: scale(0.98); }
            .text-responsive { font-size: clamp(0.875rem, 2vw, 1rem); }
            .heading-responsive { font-size: clamp(1.75rem, 5vw, 3rem); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-50 font-inter text-dark min-h-screen flex flex-col">

    <main class="flex-1 flex flex-col items-center justify-center p-5 py-12">
        <!-- Logo/Ilustrasi -->
        <div class="mb-8">
            <div class="w-48 h-32 sm:w-64 sm:h-40 rounded-2xl shadow-lg overflow-hidden border-4 border-white">
                <img 
                    src="logo-utpe2.jpg" 
                    alt="Logo UTPE" 
                    class="w-full h-full object-cover"
                    onerror="this.src='https://via.placeholder.com/300x200?text=Inventaris+Vendor'"
                >
            </div>
        </div>

        <!-- Judul -->
        <h1 class="heading-responsive font-extrabold text-center text-dark mb-3 text-shadow">
            Registrasi Barang Bawaan Vendor/Proyek
        </h1>
        <p class="text-neutral text-center text-lg sm:text-xl mb-12 max-w-md">
            Kelola barang vendor dengan mudah & cepat
        </p>

        <!-- Kartu Menu Utama -->
        <div class="bg-white rounded-3xl p-6 sm:p-8 w-full max-w-md card-shadow border border-blue-100 mb-8">
            <h2 class="text-center text-xl sm:text-2xl font-bold mb-8 text-dark">
                Menu Utama
            </h2>

            <div class="space-y-4">
                <!-- Tombol Cek In - Terhubung ke file form-vendor.html -->
                <a href="form-vendor.html" class="block">
                    <button class="w-full bg-primary hover:bg-primary/90 active:bg-primary/80 text-white p-4 sm:p-5 rounded-2xl font-semibold text-lg flex items-center justify-between shadow-md hover:shadow-lg btn-touch hover-scale">
                        <div class="flex items-center gap-3">
                            <span class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-white/20 flex items-center justify-center text-white">
                                <i class="fa-solid fa-plus"></i>
                            </span>
                            <span>Cek In Barang</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-white/70"></i>
                    </button>
                </a>

                <!-- Tombol Cek Out - Terhubung ke file form-checkout.html -->
                <a href="form-checkout.html" class="block">
                    <button class="w-full bg-secondary hover:bg-secondary/90 active:bg-secondary/80 text-white p-4 sm:p-5 rounded-2xl font-semibold text-lg flex items-center justify-between shadow-md hover:shadow-lg btn-touch hover-scale">
                        <div class="flex items-center gap-3">
                            <span class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-white/20 flex items-center justify-center text-white">
                                <i class="fa-solid fa-minus"></i>
                            </span>
                            <span>Cek Out Barang</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-white/70"></i>
                    </button>
                </a>
            </div>
        </div>

        <!-- Info Versi -->
        <div class="bg-white rounded-2xl p-4 w-full max-w-md text-center text-neutral shadow-sm border border-blue-100">
            <p class="font-medium">Sistem Berbasis Web v1.0 | Aman & Terintegrasi</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-6 text-center text-neutral text-sm">
        <p>&copy; 2026 Registrasi Barang Bawaan Vendor/Proyek. Semua Hak Dilindungi.</p>
    </footer>

</body>
</html>
